<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">Cafecito Tech — Claude 101</title>
  <desc id="desc">Flyer para Cafecito Tech junio: Claude 101, taller práctico en español.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#051d36"/>
      <stop offset="0.55" stop-color="#082946"/>
      <stop offset="1" stop-color="#0f3a5b"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="20%" r="55%">
      <stop offset="0" stop-color="#f7931a" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#f7931a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="1500" fill="url(#bg)"/>
  <rect width="1200" height="1500" fill="url(#glow)"/>
  <circle cx="1030" cy="150" r="260" fill="#f7931a" opacity="0.12"/>
  <circle cx="120" cy="1320" r="340" fill="#ffffff" opacity="0.05"/>
  <g opacity="0.12" stroke="#ffffff" stroke-width="2">
    <path d="M90 270h1020M90 470h1020M90 670h1020M90 870h1020M90 1070h1020M90 1270h1020"/>
    <path d="M190 170v1160M390 170v1160M590 170v1160M790 170v1160M990 170v1160"/>
  </g>
  <g transform="translate(90 78)">
    <text x="0" y="0" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="2">CAFECITO TECH</text>
    <text x="0" y="52" fill="#f7931a" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Link Foundation</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="90" y="220" width="1020" height="820" rx="42" fill="#ffffff" opacity="0.97"/>
    <rect x="125" y="255" width="950" height="750" rx="30" fill="#fafafa" stroke="#e8edf2"/>
  </g>
  <text x="155" y="355" fill="#f7931a" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" letter-spacing="3">CLAUDE 101</text>
  <text x="155" y="460" fill="#051d36" font-family="Space Grotesk, Arial, sans-serif" font-size="74" font-weight="800">
    <tspan x="155" dy="0">Aprende a usar</tspan>
    <tspan x="155" dy="82">la IA que está</tspan>
    <tspan x="155" dy="82">cambiando la</tspan>
    <tspan x="155" dy="82">forma de trabajar</tspan>
  </text>
  <rect x="155" y="760" width="720" height="6" rx="3" fill="#f7931a"/>
  <text x="155" y="835" fill="#26384a" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600">
    <tspan x="155" dy="0">Taller práctico en español para usar Claude</tspan>
    <tspan x="155" dy="48">en tu trabajo, vida personal y proyectos.</tspan>
  </text>
  <g transform="translate(155 940)">
    <rect x="0" y="0" width="875" height="135" rx="24" fill="#051d36"/>
    <text x="34" y="54" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Vas a salir con algo concreto:</text>
    <text x="34" y="98" fill="#f7931a" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">tu propio asistente para planear metas y semana.</text>
  </g>
  <g transform="translate(90 1120)">
    <rect x="0" y="0" width="1020" height="250" rx="36" fill="#ffffff" opacity="0.12" stroke="#ffffff" stroke-opacity="0.22"/>
    <text x="60" y="72" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Sábado 13 de junio</text>
    <text x="60" y="126" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600">10:00 AM – 12:00 PM</text>
    <text x="60" y="180" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600">Industrious NoDa · Charlotte, NC</text>
    <text x="620" y="126" fill="#f7931a" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Gratis</text>
    <text x="620" y="180" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600">Cupos limitados</text>
  </g>
  <text x="90" y="1440" fill="#ffffff" opacity="0.72" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">Desarrollando, conectando y fortaleciendo la comunidad latina interesada en tecnología.</text>
</svg>
